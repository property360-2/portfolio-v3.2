<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio moved to a new location.">
    <title>Portfolio Moved | property360-2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <main class="container">
        <div class="glass-card">
            <header>
                <span class="status-badge">REPOSITIONED</span>
                <h1>Looking for my work?</h1>
            </header>
            
            <p class="message">
                This portfolio is no longer available. I have a new link:
            </p>
            
            <div class="cta-section">
                <a href="https://property360-2.github.io/quick-portfolio/" class="main-button">
                    Visit New Portfolio
                    <span class="arrow">→</span>
                </a>
                <p class="direct-link">
                    Direct Link: <a href="https://property360-2.github.io/quick-portfolio/">property360-2.github.io/quick-portfolio/</a>
                </p>
            </div>
            
            <footer>
                <p>&copy; 2026 property360-2. All rights reserved.</p>
            </footer>
        </div>
    </main>

    <script>
        // Subtle mouse tracking for the glass effect
        document.addEventListener('mousemove', (e) => {
            const card = document.querySelector('.glass-card');
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });
    </script>
</body>
</html>
