<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio moved to a new location.">
    <meta http-equiv="refresh" content="4;url=https://property360-2.github.io/quick-portfolio/">
    <title>Portfolio Moved | property360-2</title>
    
    <!-- SEO & Metadata -->
    <link rel="canonical" href="https://property360-2.github.io/quick-portfolio/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <main class="container">
        <div class="glass-card">
            <header>
                <span class="status-badge">REPOSITIONED</span>
                <h1>Looking for my work?</h1>
            </header>
            
            <p class="message">
                This portfolio has moved to a new home with my latest 2026 projects. 
                <span class="countdown-timer" id="timer">Redirecting in 4...</span>
            </p>
            
            <div class="cta-section">
                <a href="https://property360-2.github.io/quick-portfolio/" class="main-button">
                    Visit New Portfolio
                    <span class="arrow">→</span>
                </a>
                <p class="direct-link">
                    Direct Link: <a href="https://property360-2.github.io/quick-portfolio/">property360-2.github.io/quick-portfolio/</a>
                </p>
            </div>
            
            <footer>
                <p>&copy; 2026 property360-2. All rights reserved.</p>
            </footer>
        </div>
    </main>

    <script>
        // Visible Countdown Timer
        let seconds = 4;
        const timerEl = document.getElementById('timer');
        const interval = setInterval(() => {
            seconds--;
            if (seconds > 0) {
                timerEl.textContent = `Redirecting in ${seconds}...`;
            } else {
                timerEl.textContent = "Redirecting now...";
                clearInterval(interval);
            }
        }, 1000);

        // Subtle mouse tracking for the glass effect
        document.addEventListener('mousemove', (e) => {
            const card = document.querySelector('.glass-card');
            if (card) {
                const x = (e.clientX / window.innerWidth - 0.5) * 15;
                const y = (e.clientY / window.innerHeight - 0.5) * 15;
                card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
            }
        });
    </script>
</body>
</html>
