<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio moved to a new location.">
    <meta http-equiv="refresh" content="4;url=https://property360-2.github.io/quick-portfolio/">
    <title>Blog Moved | property360-2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <main class="container">
        <div class="glass-card">
            <header>
                <span class="status-badge">BLOG MOVED</span>
                <h1>Updates & Insights</h1>
            </header>
            
            <p class="message">
                My blog posts and articles have been migrated to the new platform.
                <span class="countdown-timer" id="timer">Redirecting in 4...</span>
            </p>
            
            <div class="cta-section">
                <a href="https://property360-2.github.io/quick-portfolio/" class="main-button">
                    View New Blog
                    <span class="arrow">→</span>
                </a>
            </div>
            
            <footer>
                <p>&copy; 2026 property360-2. All rights reserved.</p>
            </footer>
        </div>
    </main>

    <script>
        let seconds = 4;
        const timerEl = document.getElementById('timer');
        const interval = setInterval(() => {
            seconds--;
            if (seconds > 0) {
                timerEl.textContent = `Redirecting in ${seconds}...`;
            } else {
                timerEl.textContent = "Redirecting now...";
                clearInterval(interval);
            }
        }, 1000);
    </script>
</body>
</html>
